<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo para Alguien Especial ✨</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none;
        }

        .viewport {
            width: 100vw; height: 100vh; perspective: 1200px;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a0b2e 0%, #000 85%);
            cursor: grab;
        }

        .scene { position: relative; width: 0; height: 0; transform-style: preserve-3d; }

        /* SOL ESFÉRICO */
        .sun-wrapper { position: absolute; transform-style: preserve-3d; z-index: 10; }
        .sun {
            position: absolute; width: 90px; height: 90px;
            background: radial-gradient(circle, #fff 10%, #ffcc00 50%, #ff6600 100%);
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 60px #ffcc00, 0 0 120px #ff6600, 0 0 200px rgba(255, 100, 0, 0.4);
        }

        /* PLANETAS (Burbujas) */
        .planet {
            position: absolute; border: 2px solid #ff007f; border-radius: 50%;
            background: rgba(0, 0, 0, 0.85); box-shadow: 0 0 20px #ff007f;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: white; text-align: center;
            padding: 10px; pointer-events: none;
        }
        .planet img { width: 45px; height: 45px; margin-bottom: 5px; pointer-events: none; }
        .planet p { margin: 0; font-weight: bold; font-size: 13px; text-shadow: 0 0 5px #ff007f; }

        /* ESTRELLAS FUGACES FONDO */
        .shooting-star {
            position: absolute; width: 150px; height: 2px;
            background: linear-gradient(90deg, #fff, transparent);
            pointer-events: none;
        }

        /* METEORITO DE IMPACTO */
        .meteor {
            position: absolute; width: 25px; height: 25px;
            background: #fff; border-radius: 50%;
            box-shadow: 0 0 20px #ff4500, 0 0 40px #ff007f;
            z-index: 500; pointer-events: none;
        }

        /* MENSAJE DE IMPACTO */
        #impact-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 0, 0, 0.6); border: 2px solid #ff007f;
            padding: 15px 30px; border-radius: 50px; color: white;
            font-size: 22px; font-weight: bold; backdrop-filter: blur(8px);
            box-shadow: 0 0 40px #ff007f; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; text-align: center; pointer-events: none;
            white-space: nowrap;
        }

        .star-bg { position: absolute; background: white; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <div id="impact-msg">✨</div>

    <div class="viewport" id="viewport">
        <div class="scene" id="scene">
            <div class="sun-wrapper" id="sunWrapper"><div class="sun"></div></div>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const viewport = document.getElementById('viewport');
        const sunWrapper = document.getElementById('sunWrapper');
        const impactMsg = document.getElementById('impact-msg');
        
        const loveData = [
            { img: 'https://cdn-icons-png.flaticon.com/512/3588/3588631.png', txt: '¿POR QUÉ TAN LINDA?' },
            { txt: 'HACES MI MUNDO BRILLAR' },
            { img: 'https://cdn-icons-png.flaticon.com/512/1090/1090806.png', txt: 'ERES MI FAVORITA' },
            { txt: 'UN UNIVERSO CONTIGO' },
            { img: 'https://cdn-icons-png.flaticon.com/512/833/833472.png', txt: 'ME ENCANTAS' },
            { txt: 'TIENES ALGO MÁGICO' }
        ];

        const specialPhrases = [
            "¡Impactado por tu sonrisa! 😍",
            "¡Eres de otro planeta! 🚀",
            "¡Me dejas sin palabras! ✨",
            "¡Mi mundo gira por ti! 💖",
            "¡Eres una estrella! ⭐",
            "¡Qué suerte conocerte! 😊"
        ];

        const planets = [];
        
        // Estrellas de fondo estáticas
        for(let i=0; i<200; i++) {
            const s = document.createElement('div');
            s.className = 'star-bg';
            const size = Math.random() * 2;
            s.style.width = s.style.height = size + 'px';
            const [x, y, z] = [Math.random()-0.5, Math.random()-0.5, Math.random()-0.5].map(v => v * 3000);
            s.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            scene.appendChild(s);
        }

        // Crear Planetas Orbitantes
        loveData.forEach((data, i) => {
            const pEl = document.createElement('div');
            pEl.className = 'planet';
            pEl.style.width = pEl.style.height = '125px';
            if(data.img) {
                const img = document.createElement('img'); img.src = data.img;
                pEl.appendChild(img);
            }
            const p = document.createElement('p'); p.textContent = data.txt;
            pEl.appendChild(p);
            scene.appendChild(pEl);
            
            planets.push({
                el: pEl,
                angle: (i / loveData.length) * Math.PI * 2,
                radius: 350 + (i * 25),
                speed: 0.004 + (Math.random() * 0.002),
                yPos: (Math.random() - 0.5) * 250
            });
        });

        // Estrellas fugaces de fondo constantes
        function shootStar() {
            const s = document.createElement('div');
            s.className = 'shooting-star';
            const [x, y, z] = [(Math.random()-0.5)*2500, (Math.random()-0.5)*2500, (Math.random()-0.5)*1500];
            s.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotate(${Math.random()*360}deg)`;
            scene.appendChild(s);
            s.animate([{left: '-100px', opacity: 1}, {left: '500px', opacity: 0}], {duration: 1200});
            setTimeout(() => s.remove(), 1200);
        }
        setInterval(shootStar, 600);

        // --- SISTEMA DE IMPACTOS MÚLTIPLES ---
        function launchMeteor() {
            const m = document.createElement('div');
            m.className = 'meteor';
            scene.appendChild(m);
            
            // Elegir un planeta al azar para el impacto
            const target = planets[Math.floor(Math.random() * planets.length)];
            const startPos = { x: (Math.random()-0.5)*2000, y: -1000, z: (Math.random()-0.5)*1000 };
            
            let progress = 0;
            const anim = setInterval(() => {
                progress += 0.025; // Velocidad del meteorito
                
                // Posición actual del planeta (se mueve mientras el meteorito cae)
                const px = Math.cos(target.angle) * target.radius;
                const py = target.yPos;
                const pz = Math.sin(target.angle) * target.radius;

                // Interpolación para el movimiento del meteorito
                const mx = startPos.x + (px - startPos.x) * progress;
                const my = startPos.y + (py - startPos.y) * progress;
                const mz = startPos.z + (pz - startPos.z) * progress;

                m.style.transform = `translate3d(${mx}px, ${my}px, ${mz}px)`;

                if(progress >= 1) {
                    clearInterval(anim);
                    m.remove();
                    showImpactMessage();
                }
            }, 16);
        }

        function showImpactMessage() {
            impactMsg.textContent = specialPhrases[Math.floor(Math.random()*specialPhrases.length)];
            impactMsg.style.transform = "translate(-50%, -50%) scale(1.2)";
            impactMsg.style.opacity = "1";
            
            setTimeout(() => {
                impactMsg.style.transform = "translate(-50%, -50%) scale(0)";
                impactMsg.style.opacity = "0";
            }, 2000);
        }

        // Lanza meteoritos en ráfagas
        setInterval(() => {
            launchMeteor();
            setTimeout(launchMeteor, 1500); // Un segundo meteorito poco después
        }, 7000); 

        // Rotación de Cámara 360 e Interacción
        let rotX = -10, rotY = 0, tRotX = -10, tRotY = 0, isDown = false, sX, sY;
        viewport.onpointerdown = e => { isDown = true; sX = e.clientX; sY = e.clientY; };
        window.onpointermove = e => { if(!isDown) return; tRotY += (e.clientX-sX)*0.2; tRotX -= (e.clientY-sY)*0.2; sX = e.clientX; sY = e.clientY; };
        window.onpointerup = () => isDown = false;

        function draw() {
            // Suavizado de rotación
            rotX += (tRotX - rotX) * 0.1; rotY += (tRotY - rotY) * 0.1;
            scene.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            
            // Sol siempre mirando a cámara
            sunWrapper.style.transform = `rotateY(${-rotY}deg) rotateX(${-rotX}deg)`;

            planets.forEach(p => {
                p.angle += p.speed;
                const x = Math.cos(p.angle) * p.radius;
                const z = Math.sin(p.angle) * p.radius;
                
                // Billboard effect + escala por profundidad
                const s = 1 + (z / 1500);
                p.el.style.transform = `translate3d(${x}px, ${p.yPos}px, ${z}px) 
                                       rotateY(${-rotY}deg) rotateX(${-rotX}deg) 
                                       scale(${s})`;
                p.el.style.zIndex = Math.round(z + 500);
                p.el.style.opacity = 0.5 + ((z + 500) / 1000); // Más tenue al fondo
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
